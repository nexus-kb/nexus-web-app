name: Web CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run pnpm tests
        run: pnpm test

      - name: Build static export
        run: pnpm build

      - name: Validate static export output
        run: test -f out/index.html

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Compute image reference
        id: prep
        run: |
          echo "image_ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.prep.outputs.image_ref }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short,prefix=sha-

      - name: Build local image candidate for scan
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: local/nexus-web-app:scan
          cache-from: type=gha,scope=nexus-web-app-image
          cache-to: type=gha,mode=max,scope=nexus-web-app-image

      - name: Scan image for critical vulnerabilities
        id: scan_vuln_gate
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # 0.32.0
        with:
          scan-type: image
          image-ref: local/nexus-web-app:scan
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          scanners: vuln
          hide-progress: true
          exit-code: "1"

      - name: Scan image for secrets
        id: scan_secret_gate
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # 0.32.0
        with:
          scan-type: image
          image-ref: local/nexus-web-app:scan
          format: table
          scanners: secret
          hide-progress: true
          exit-code: "1"

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # 0.32.0
        with:
          scan-type: image
          image-ref: local/nexus-web-app:scan
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          scanners: vuln,secret
          hide-progress: true
          exit-code: "0"

      - name: Upload Trivy SARIF report
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nexus-web-app-image
          cache-to: type=gha,mode=max,scope=nexus-web-app-image
          provenance: true
          sbom: true

      - name: Publish summary
        if: always()
        run: |
          vuln_gate="${{ steps.scan_vuln_gate.outcome }}"
          secret_gate="${{ steps.scan_secret_gate.outcome }}"
          push_status="${{ steps.build_push.outcome }}"
          digest="${{ steps.build_push.outputs.digest }}"

          if [ -z "$push_status" ]; then
            push_status="skipped"
          fi
          if [ -z "$digest" ]; then
            digest="n/a"
          fi

          {
            echo "### Web Publish Summary";
            echo "";
            echo "- Vulnerability gate status: \`${vuln_gate}\`";
            echo "- Secret gate status: \`${secret_gate}\`";
            echo "- Push status: \`${push_status}\`";
            echo "- Image: \`${{ steps.prep.outputs.image_ref }}\`";
            echo "- Digest: \`${digest}\`";
            echo "- Tags:";
            echo '```';
            echo "${{ steps.meta.outputs.tags }}";
            echo '```';
          } >> "${GITHUB_STEP_SUMMARY}"
